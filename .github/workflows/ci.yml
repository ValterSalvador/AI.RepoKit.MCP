name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2025
          - ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Pack
        run: dotnet pack src/AiRepoKit.Cli/AiRepoKit.Cli.csproj -c Release -o artifacts/nuget --no-build

      - name: Smoke version
        if: runner.os == 'Windows'
        run: dotnet run --project src/AiRepoKit.Cli/AiRepoKit.Cli.csproj -- --version

      - name: Smoke doctor
        if: runner.os == 'Windows'
        run: dotnet run --project src/AiRepoKit.Cli/AiRepoKit.Cli.csproj -- doctor --repo .

      - name: Smoke plan
        if: runner.os == 'Windows'
        run: dotnet run --project src/AiRepoKit.Cli/AiRepoKit.Cli.csproj -- plan --repo . --clients codex,vscode,visualstudio --mcp

      - name: Upload NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: nuget-${{ matrix.os }}
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error
